<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin — Examify</title>

    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/admin.css" />
  </head>

  <body>
    <button class="mobile-menu-btn" id="menuBtn">☰</button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div class="page-header">
          <div class="page-title">Admin Panel</div>

          <div style="display: flex; gap: 8px">
            <button class="btn btn-secondary" onclick="showTab('quizzes')">
              Quizzes
            </button>

            <button class="btn btn-secondary" onclick="showTab('users')">
              Users
            </button>
          </div>
        </div>

        <div id="stats-row" class="grid-4" style="margin-bottom: 24px">
          <div class="loading-center"><div class="spinner"></div></div>
        </div>

        <div id="tab-quizzes">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div style="font-weight:700;font-size:16px">All Quizzes</div>

            <button class="btn btn-primary"
              onclick="openModal('quiz-modal'); resetQuizForm();">
              + New Quiz
            </button>
          </div>

          <div id="quiz-list">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>

        <div id="tab-users" style="display:none">
          <div style="font-weight:700;font-size:16px;margin-bottom:16px">
            All Users
          </div>

          <div id="user-list">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>
      </main>
    </div>

    <!-- QUIZ MODAL -->
    <div class="modal-overlay" id="quiz-modal" style="display:none"
      onclick="if(event.target===this) closeModal('quiz-modal')">

      <div class="modal">
        <div class="modal-header">
          <div class="modal-title" id="quiz-modal-title">New Quiz</div>
          <button class="modal-close" onclick="closeModal('quiz-modal')">✕</button>
        </div>

        <form id="quiz-form" onsubmit="saveQuiz(event)">
          <input type="hidden" id="edit-quiz-id" />

          <div class="form-group">
            <label>Title</label>
            <input id="q-title" required />
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="q-desc" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label>Subject</label>
            <select id="q-subject">
              <option value="">No subject</option>
            </select>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label>Duration</label>
              <input id="q-duration" type="number" value="30" min="5" />
            </div>

            <div class="form-group">
              <label>Status</label>
              <select id="q-status">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
                <option value="archived">Archived</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Scheduled Date</label>
            <input id="q-scheduled" type="datetime-local" />
          </div>

          <div style="display:flex;gap:10px">
            <button type="button" class="btn btn-secondary"
              onclick="closeModal('quiz-modal')">Cancel</button>

            <button type="submit" class="btn btn-primary" style="flex:1">
              Save Quiz
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- QUESTION MODALS -->
    <div class="modal-overlay" id="q-modal" style="display:none"
      onclick="if(event.target===this) closeModal('q-modal')">

      <div class="modal" style="max-width:700px">
        <div class="modal-header">
          <div class="modal-title">Manage Questions</div>
          <button class="modal-close" onclick="closeModal('q-modal')">✕</button>
        </div>

        <div id="q-modal-body"></div>
      </div>
    </div>

    <div class="modal-overlay" id="add-q-modal" style="display:none"
      onclick="if(event.target===this) closeModal('add-q-modal')">

      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Add Question</div>
          <button class="modal-close" onclick="closeModal('add-q-modal')">✕</button>
        </div>

        <form id="add-q-form" onsubmit="saveQuestion(event)">
          <div class="form-group">
            <label>Question</label>
            <textarea id="aq-text" rows="3" required></textarea>
          </div>

          <div class="form-group"><label>A</label><input id="aq-a" required /></div>
          <div class="form-group"><label>B</label><input id="aq-b" required /></div>
          <div class="form-group"><label>C</label><input id="aq-c" required /></div>
          <div class="form-group"><label>D</label><input id="aq-d" required /></div>

          <div class="form-group">
            <label>Correct</label>
            <select id="aq-correct">
              <option value="a">A</option>
              <option value="b">B</option>
              <option value="c">C</option>
              <option value="d">D</option>
            </select>
          </div>

          <div class="form-group">
            <label>Explanation</label>
            <textarea id="aq-exp"></textarea>
          </div>

          <div style="display:flex;gap:10px">
            <button type="button" class="btn btn-secondary"
              onclick="closeModal('add-q-modal')">Cancel</button>

            <button type="submit" class="btn btn-primary" style="flex:1">
              Add Question
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="./js/app.js"></script>

    <script>
      let subjects = [];
      let currentQuizId = null;

      function showTab(tab) {
        document.getElementById("tab-quizzes").style.display =
          tab === "quizzes" ? "" : "none";

        document.getElementById("tab-users").style.display =
          tab === "users" ? "" : "none";

        // Lazy load (IMPORTANT FIX)
        if (tab === "users") loadUsers();
        if (tab === "quizzes") loadQuizzes();
      }

      async function loadStats() {
        const stats = await api("/api/admin?type=stats");
        if (!stats) return;

        document.getElementById("stats-row").innerHTML = `
          <div class="stat-card">Students: ${stats.total_students || 0}</div>
          <div class="stat-card">Quizzes: ${stats.total_quizzes || 0}</div>
          <div class="stat-card">Attempts: ${stats.total_attempts || 0}</div>
          <div class="stat-card">Avg: ${stats.avg_score || 0}%</div>
        `;
      }

      async function loadQuizzes() {
        const quizzes = await api("/api/admin?type=quizzes");
        if (!quizzes) return;

        document.getElementById("quiz-list").innerHTML = quizzes.length
          ? quizzes.map(q => `
            <div class="card">
              <b>${q.title}</b> - ${q.status}
              <div>
                <button onclick='editQuiz(${JSON.stringify(q)})'>Edit</button>
                <button onclick="manageQs(${q.id})">Questions</button>
                <button onclick="deleteQuiz(${q.id})">Delete</button>
              </div>
            </div>
          `).join("")
          : `<div>No quizzes yet</div>`;
      }

      async function loadUsers() {
        const users = await api("/api/admin?type=users");
        if (!users) return;

        document.getElementById("user-list").innerHTML = users.map(u => `
          <div class="card">
            ${u.name} - ${u.email}
          </div>
        `).join("");
      }

      function resetQuizForm() {
        document.getElementById("quiz-form").reset();
        document.getElementById("edit-quiz-id").value = "";
      }

      async function saveQuiz(e) {
        e.preventDefault();

        const id = document.getElementById("edit-quiz-id").value;

        const body = {
          title: document.getElementById("q-title").value,
          description: document.getElementById("q-desc").value,
          subject_id: document.getElementById("q-subject").value || null,
          duration_minutes: Number(document.getElementById("q-duration").value),
          status: document.getElementById("q-status").value,
        };

        await api(
          id
            ? `/api/admin?type=updateQuiz&id=${id}`
            : "/api/admin?type=createQuiz",
          {
            method: id ? "PUT" : "POST",
            body,
          }
        );

        closeModal("quiz-modal");
        loadQuizzes();
        loadStats();
      }

      function editQuiz(q) {
        document.getElementById("edit-quiz-id").value = q.id;
        document.getElementById("q-title").value = q.title;
        document.getElementById("q-desc").value = q.description || "";
        document.getElementById("q-status").value = q.status;
        openModal("quiz-modal");
      }

      (async () => {
        try {
          const user = await requireAdminUser();
          if (!user) return (location.href = "/login.html");

          document.getElementById("sidebar").innerHTML =
            renderSidebar("/admin.html", true);

          subjects = (await api("/api/subjects")) || [];

          const select = document.getElementById("q-subject");
          subjects.forEach(s => {
            const opt = document.createElement("option");
            opt.value = s.id;
            opt.textContent = s.name;
            select.appendChild(opt);
          });

          // 🚀 FAST START (no blocking loads)
          loadStats();
          loadQuizzes();
        } catch (err) {
          console.error(err);
        }
      })();

      const menuBtn = document.getElementById("menuBtn");
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");

      menuBtn.onclick = () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      };

      overlay.onclick = () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      };
    </script>
  </body>
</html>
