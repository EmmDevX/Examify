<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin — Examify</title>

    <link rel="icon" type="image/png" href="./favicon.png" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/admin.css" />
  </head>

  <body>
    <button class="mobile-menu-btn" id="menuBtn">☰</button>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div class="page-header">
          <div class="page-title">Admin Panel</div>

          <div style="display: flex; gap: 8px">
            <button class="btn btn-secondary" onclick="showTab('quizzes')">
              Quizzes
            </button>

            <button class="btn btn-secondary" onclick="showTab('users')">
              Users
            </button>
          </div>
        </div>

        <div id="stats-row" class="grid-4" style="margin-bottom: 24px">
          <div class="loading-center">
            <div class="spinner"></div>
          </div>
        </div>

        <div id="tab-quizzes">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 16px;
            "
          >
            <div style="font-weight: 700; font-size: 16px">All Quizzes</div>

            <button
              class="btn btn-primary"
              onclick="
                openModal('quiz-modal');
                resetQuizForm();
              "
            >
              + New Quiz
            </button>
          </div>

          <div id="quiz-list">
            <div class="loading-center">
              <div class="spinner"></div>
            </div>
          </div>
        </div>

        <div id="tab-users" style="display: none">
          <div style="font-weight: 700; font-size: 16px; margin-bottom: 16px">
            All Users
          </div>

          <div id="user-list">
            <div class="loading-center">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div
      class="modal-overlay"
      id="quiz-modal"
      style="display: none"
      onclick="if (event.target === this) closeModal('quiz-modal');"
    >
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title" id="quiz-modal-title">New Quiz</div>

          <button class="modal-close" onclick="closeModal('quiz-modal')">
            ✕
          </button>
        </div>

        <form id="quiz-form" onsubmit="saveQuiz(event)">
          <input type="hidden" id="edit-quiz-id" />

          <div class="form-group">
            <label>Title</label>
            <input id="q-title" required />
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="q-desc" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label>Subject</label>

            <select id="q-subject">
              <option value="">No subject</option>
            </select>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
            <div class="form-group">
              <label>Duration (mins)</label>

              <input id="q-duration" type="number" value="30" min="5" />
            </div>

            <div class="form-group">
              <label>Status</label>

              <select id="q-status">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
                <option value="archived">Archived</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Scheduled Date</label>

            <input id="q-scheduled" type="datetime-local" />
          </div>

          <div style="display: flex; gap: 10px">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal('quiz-modal')"
            >
              Cancel
            </button>

            <button type="submit" class="btn btn-primary" style="flex: 1">
              Save Quiz
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      class="modal-overlay"
      id="q-modal"
      style="display: none"
      onclick="if (event.target === this) closeModal('q-modal');"
    >
      <div class="modal" style="max-width: 700px">
        <div class="modal-header">
          <div class="modal-title">Manage Questions</div>

          <button class="modal-close" onclick="closeModal('q-modal')">✕</button>
        </div>

        <div id="q-modal-body"></div>
      </div>
    </div>

    <div
      class="modal-overlay"
      id="add-q-modal"
      style="display: none"
      onclick="if (event.target === this) closeModal('add-q-modal');"
    >
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Add Question</div>

          <button class="modal-close" onclick="closeModal('add-q-modal')">
            ✕
          </button>
        </div>

        <form id="add-q-form" onsubmit="saveQuestion(event)">
          <input type="hidden" id="aq-quiz-id" />

          <div class="form-group">
            <label>Question</label>

            <textarea id="aq-text" rows="3" required></textarea>
          </div>

          <div class="form-group">
            <label>Option A</label>
            <input id="aq-a" required />
          </div>

          <div class="form-group">
            <label>Option B</label>
            <input id="aq-b" required />
          </div>

          <div class="form-group">
            <label>Option C</label>
            <input id="aq-c" required />
          </div>

          <div class="form-group">
            <label>Option D</label>
            <input id="aq-d" required />
          </div>

          <div class="form-group">
            <label>Correct Answer</label>

            <select id="aq-correct">
              <option value="a">A</option>
              <option value="b">B</option>
              <option value="c">C</option>
              <option value="d">D</option>
            </select>
          </div>

          <div class="form-group">
            <label>Explanation</label>

            <textarea id="aq-exp" rows="2"></textarea>
          </div>

          <div style="display: flex; gap: 10px">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal('add-q-modal')"
            >
              Cancel
            </button>

            <button type="submit" class="btn btn-primary" style="flex: 1">
              Add Question
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="./js/app.js"></script>

    <script>
      let subjects = [];
    let currentQuizId = null;
    


      function showTab(tab) {
        document.getElementById("tab-quizzes").style.display =
          tab === "quizzes" ? "" : "none";

        document.getElementById("tab-users").style.display =
          tab === "users" ? "" : "none";
      }

      async function loadStats() {
        const stats = await api("/api/admin?type=stats");

        if (!stats) return;

        document.getElementById("stats-row").innerHTML = [
          {
            label: "Students",
            value: stats.total_students || 0,
            color: "var(--accent)",
          },

          {
            label: "Quizzes",
            value: stats.total_quizzes || 0,
            color: "var(--primary)",
          },

          {
            label: "Attempts",
            value: stats.total_attempts || 0,
            color: "var(--warning)",
          },

          {
            label: "Avg Score",
            value: `${stats.avg_score || 0}%`,
            color: "var(--success)",
          },
        ]
          .map(
            (card) => `
      <div class="stat-card">

        <div
          style="
            font-size:12px;
            color:var(--muted);
            margin-bottom:8px;
          "
        >
          ${card.label}
        </div>

        <div
          style="
            font-size:32px;
            font-weight:800;
            color:${card.color};
          "
        >
          ${card.value}
        </div>

      </div>
  `,
          )
          .join("");
      }

      async function loadQuizzes() {
        const quizzes = await api("/api/admin?type=quizzes");

        if (!quizzes) return;

        document.getElementById("quiz-list").innerHTML = quizzes.length
          ? `
      <div class="card" style="padding:0;overflow:hidden">

        <table>

          <thead>
            <tr>
              <th>Title</th>
              <th>Subject</th>
              <th>Questions</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>

            ${quizzes
              .map(
                (q) => `

              <tr>

                <td>

                  <div style="font-weight:600">
                    ${q.title}
                  </div>

                  <div
                    style="
                      font-size:12px;
                      color:var(--muted);
                    "
                  >
                    ${q.description || ""}
                  </div>

                </td>

                <td>
                  ${q.subject_name || "—"}
                </td>

                <td>
                  ${q.question_count || 0}
                </td>

                <td>

                  <span class="badge badge-green">
                    ${q.status}
                  </span>

                </td>

                <td>

                  <div
                    style="
                      display:flex;
                      gap:6px;
                      flex-wrap:wrap;
                    "
                  >

                    <button
                      class="btn btn-sm btn-secondary"
                      onclick='editQuiz(${JSON.stringify(q)})'
                    >
                      Edit
                    </button>

                    <button
                      class="btn btn-sm btn-secondary"
                      onclick="manageQs(${q.id})"
                    >
                      Questions
                    </button>

                    <button
                      class="btn btn-sm btn-danger"
                      onclick="deleteQuiz(${q.id})"
                    >
                      Delete
                    </button>

                  </div>

                </td>

              </tr>

            `,
              )
              .join("")}

          </tbody>

        </table>

      </div>
    `
          : `
      <div
        class="card"
        style="
          text-align:center;
          padding:40px;
          color:var(--muted);
        "
      >
        No quizzes yet
      </div>
    `;
      }

      async function loadUsers() {
        const users = await api("/api/admin?type=users");

        if (!users) return;

        document.getElementById("user-list").innerHTML = `
    <div class="card" style="padding:0;overflow:hidden">

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Attempts</th>
            <th>Joined</th>
          </tr>
        </thead>

        <tbody>

          ${users
            .map(
              (user) => `

            <tr>

              <td>${user.name}</td>

              <td>${user.email}</td>

              <td>${user.role}</td>

              <td>${user.attempt_count || 0}</td>

              <td>
                ${new Date(user.created_at).toLocaleDateString()}
              </td>

            </tr>

          `,
            )
            .join("")}

        </tbody>

      </table>

    </div>
  `;
      }

      function resetQuizForm() {
        document.getElementById("quiz-form").reset();

        document.getElementById("edit-quiz-id").value = "";

        document.getElementById("quiz-modal-title").textContent = "New Quiz";
      }

      function editQuiz(q) {
        document.getElementById("edit-quiz-id").value = q.id;

        document.getElementById("quiz-modal-title").textContent = "Edit Quiz";

        document.getElementById("q-title").value = q.title;

        document.getElementById("q-desc").value = q.description || "";

        document.getElementById("q-subject").value = q.subject_id || "";

        document.getElementById("q-duration").value = q.duration_minutes;

        document.getElementById("q-status").value = q.status;

        openModal("quiz-modal");
      }

      async function saveQuiz(e) {
        e.preventDefault();

        const id = document.getElementById("edit-quiz-id").value;

        const subjectValue = document.getElementById("q-subject").value;
        const scheduledValue = document.getElementById("q-scheduled").value;

        const body = {
          title: document.getElementById("q-title").value,
          description: document.getElementById("q-desc").value,
          subject_id: subjectValue ? Number(subjectValue) : null,
          duration_minutes: Number(document.getElementById("q-duration").value),
          status: document.getElementById("q-status").value,
          scheduled_at: scheduledValue
            ? new Date(scheduledValue).toISOString()
            : null,
        };

        try {
          if (id) {
            await api(`/api/admin?type=updateQuiz&id=${id}`, {
              method: "PUT",
              body,
            });
          } else {
            await api("/api/admin?type=createQuiz", {
              method: "POST",
              body,
            });
          }

          closeModal("quiz-modal");

          toast("Quiz saved", "success");

          loadQuizzes();
          loadStats();
        } catch (err) {
          console.error(err);
          toast(err.message, "error");
        }
      }

      async function deleteQuiz(id) {
        if (!confirm("Delete this quiz?")) return;

        try {
          await api(`/api/admin?type=deleteQuiz&id=${id}`, {
            method: "DELETE",
          });

          toast("Quiz deleted", "success");

          loadQuizzes();

          loadStats();
        } catch (err) {
          toast(err.message, "error");
        }
      }

      async function manageQs(quizId) {
        document.getElementById("q-modal-body").innerHTML = loadingHTML();

        openModal("q-modal");

        await refreshQs(quizId);
      }

      async function refreshQs(quizId) {
        const qs = await api(`/api/admin?type=questions&quiz_id=${quizId}`);

        if (!qs) return;

        document.getElementById("q-modal-body").innerHTML = `

      <div style="margin-bottom:14px;text-align:right">
   <button
  class="btn btn-primary btn-sm"
  onclick="openAddQ(${quizId})"
>
  + Add Question
</button>
</div>

    ${
      qs.length
        ? qs
            .map(
              (q, i) => `

          <div
            style="
              background:var(--bg2);
              border:1px solid var(--border);
              border-radius:10px;
              padding:14px;
              margin-bottom:12px;
            "
          >

            <div
              style="
                display:flex;
                justify-content:space-between;
                gap:10px;
              "
            >

              <div>
                <b>Q${i + 1}.</b> ${q.text}
              </div>

              <button
                class="btn btn-danger btn-sm"
                onclick="deleteQ(${q.id}, ${quizId})"
              >
                ✕
              </button>

            </div>

          </div>

        `,
            )
            .join("")
        : `
        <div
          style="
            text-align:center;
            color:var(--muted);
            padding:20px;
          "
        >
          No questions yet
        </div>
      `
    }
  `;
      }

      function openAddQ(quizId) {
  currentQuizId = Number(quizId);
  openModal("add-q-modal");
}

       async function saveQuestion(e) {
  e.preventDefault();

  const quizId = currentQuizId;

  if (!quizId) {
    toast("Quiz not selected", "error");
    return;
  }

  const body = {
    quiz_id: parseInt(quizId),
    text: document.getElementById("aq-text").value,
    option_a: document.getElementById("aq-a").value,
    option_b: document.getElementById("aq-b").value,
    option_c: document.getElementById("aq-c").value,
    option_d: document.getElementById("aq-d").value,
    correct_option: document.getElementById("aq-correct").value,
    explanation: document.getElementById("aq-exp").value,
  };

  await api("/api/admin?type=addQuestion", {
    method: "POST",
    body,
  });

  closeModal("add-q-modal");
  toast("Question added", "success");

  refreshQs(quizId);
  loadQuizzes();
}
      (async () => {
        const user = await requireAdminUser();

        if (!user) return;

        document.getElementById("sidebar").innerHTML = renderSidebar(
          "/admin.html",
          true,
        );

        subjects = (await api("/api/subjects")) || [];

        const select = document.getElementById("q-subject");

        subjects.forEach((subject) => {
          const option = document.createElement("option");

          option.value = subject.id;

          option.textContent = subject.name;

          select.appendChild(option);
        });

        loadStats();

        loadQuizzes();

        loadUsers();
      })();

      const sidebar = document.getElementById("sidebar");

      const menuBtn = document.getElementById("menuBtn");

      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("active");

        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");

        overlay.classList.remove("active");
      });
    </script>
  </body>
</html>
