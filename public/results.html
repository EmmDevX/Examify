<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results — Examify</title>

    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/toogle.css" />
  </head>
  <body>
    <button class="mobile-menu-btn" id="menuBtn">☰</button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div id="content">
          <div class="loading-center">
            <div class="spinner"></div>
            <p>Loading results...</p>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/app.js"></script>

    <script>
      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }

      (async () => {
        const user = await requireAuth();

        if (!user) return;

        document.getElementById("sidebar").innerHTML = renderSidebar(
          "/results.html",
          user.role === "admin"
        );

        const attemptId = new URLSearchParams(location.search).get("attempt");

        if (!attemptId) {
          location.href = "./quizzes.html";
          return;
        }

        try {
          const attempt = await api(
            `/api/attempts?action=get&id=${attemptId}`
          );

          if (!attempt) return;

          // SAFE VALUES
          const totalQuestions =
            Number(attempt.total_questions) ||
            Number(attempt.answers?.length) ||
            0;

          const score = Number(attempt.score) || 0;

          const wrong = Math.max(0, totalQuestions - score);

          const pct =
            totalQuestions > 0
              ? Math.round((score / totalQuestions) * 100)
              : 0;

          const passed = pct >= 50;

          const col =
            pct >= 60
              ? "var(--success)"
              : pct >= 40
              ? "var(--warning)"
              : "var(--danger)";

            let dur = "0";

if (attempt.completed_at && attempt.started_at) {
  dur = Math.max(
    1,
    Math.round(
      (new Date(attempt.completed_at) -
        new Date(attempt.started_at)) /
        60000
    )
  );
}
console.log(attempt);
console.log(attempt.answers);
          document.getElementById("content").innerHTML = `
            <div class="page-header">
              <div>
                <div class="page-title">Quiz Results</div>
                <div class="page-subtitle">
                  Review your performance and answers
                </div>
              </div>

              <div style="display:flex;gap:10px;align-items:center">
                <button id="themeToggle" class="btn btn-secondary">
                  ${
                    document.body.classList.contains("dark")
                      ? "Light Mode ☀️"
                      : "Dark Mode 🌙"
                  }
                </button>

                <a href="./quizzes.html" class="btn btn-primary">
                  Take Another Quiz →
                </a>
              </div>
            </div>

            <div style="max-width:950px;margin:0 auto">

              <div class="card"
                style="text-align:center;padding:40px;margin-bottom:24px">

                <div style="
                  width:140px;
                  height:140px;
                  margin:0 auto 20px;
                  border-radius:50%;
                  border:8px solid ${col};
                  display:flex;
                  align-items:center;
                  justify-content:center;
                  font-size:42px;
                  font-weight:800;
                  color:${col};
                  background:rgba(255,255,255,0.03)">
                  ${pct}%
                </div>

                <div style="font-size:28px;font-weight:800;margin-bottom:8px">
                  ${passed ? "🎉 Passed!" : "📚 Keep Practicing"}
                </div>

                <div style="color:var(--muted);font-size:15px;margin-bottom:24px">
                  ${score} correct out of ${totalQuestions} questions
                </div>

                <div class="grid-4" style="gap:16px">

                  <div class="stat-card">
                    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                      SCORE
                    </div>
                    <div style="font-size:28px;font-weight:800;color:${col}">
                      ${pct}%
                    </div>
                  </div>

                  <div class="stat-card">
                    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                      CORRECT
                    </div>
                    <div style="font-size:28px;font-weight:800;color:var(--success)">
                      ${score}
                    </div>
                  </div>

                  <div class="stat-card">
                    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                      WRONG
                    </div>
                    <div style="font-size:28px;font-weight:800;color:var(--danger)">
                      ${wrong}
                    </div>
                  </div>

                  <div class="stat-card">
                    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                      TIME
                    </div>
                    <div style="font-size:28px;font-weight:800;color:var(--accent)">
                      ${dur}m
                    </div>
                  </div>

                </div>

              </div>

              <div class="card">

                <div style="font-size:20px;font-weight:700;margin-bottom:20px">
                  Answer Review
                </div>

               ${(attempt.answers || [])
  .map((a, i) => {
    const question =
      a.text ||
      a.question ||
      a.question_text ||
      "Question unavailable";

    const correct =
      a.correct_option ||
      a.correct_answer ||
      a.correctAnswer ||
      "N/A";

    const selected =
      a.selected_option ||
      a.selected_answer ||
      a.selectedAnswer ||
      a.user_answer ||
      "Not Answered";

    return `
      <div style="padding:20px 0;border-bottom:1px solid rgba(42,42,106,0.35)">
        
        <div style="font-size:15px;font-weight:600">
          Q${i + 1}. ${question}
        </div>

        <div style="margin-top:10px">
          Correct: <b>${correct}</b> |
          Your Answer: <b>${selected}</b>
        </div>

        ${
          a.explanation
            ? `
            <div style="margin-top:10px;color:var(--accent)">
              💡 ${a.explanation}
            </div>
          `
            : ""
        }

      </div>
    `;
  })
  .join("")}
              </div>

            </div>
          `;

          document
            .getElementById("themeToggle")
            .addEventListener("click", () => {
              document.body.classList.toggle("dark");

              const isDark = document.body.classList.contains("dark");

              localStorage.setItem("theme", isDark ? "dark" : "light");
            });
        } catch (e) {
          document.getElementById("content").innerHTML = `
            <div class="card" style="text-align:center;padding:60px">
              <div style="font-size:48px;margin-bottom:16px">⚠️</div>

              <div style="font-size:18px;font-weight:700;margin-bottom:10px">
                Failed to load results
              </div>

              <p style="color:var(--danger)">
                ${e.message}
              </p>

              <a href="./quizzes.html" class="btn btn-primary">
                Back to Quizzes
              </a>
            </div>
          `;
        }
      })();
    </script>
  </body>
</html>
