<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results — Examify</title>

    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/toogle.css" />
  </head>
  <body>
    <button class="mobile-menu-btn" id="menuBtn">☰</button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div id="content">
          <div class="loading-center">
            <div class="spinner"></div>
            <p>Loading results...</p>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/app.js"></script>

    <script>
      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }

      (async () => {
        const user = await requireAuth();

        if (!user) return;

        document.getElementById("sidebar").innerHTML = renderSidebar(
          "/results.html",
          user.role === "admin",
        );

        const attemptId = new URLSearchParams(location.search).get("attempt");

        if (!attemptId) {
          location.href = "./quizzes.html";
          return;
        }

        try {
          const attempt = await api(`/api/attempts/${attemptId}`);

          if (!attempt) return;

          const pct = attempt.total_questions
            ? Math.round((attempt.score / attempt.total_questions) * 100)
            : 0;

          const passed = pct >= 50;

          const col =
            pct >= 60
              ? "var(--success)"
              : pct >= 40
                ? "var(--warning)"
                : "var(--danger)";

          const dur =
            attempt.completed_at && attempt.started_at
              ? Math.round(
                  (new Date(attempt.completed_at) -
                    new Date(attempt.started_at)) /
                    60000,
                )
              : "—";

          document.getElementById("content").innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">Quiz Results</div>
          <div class="page-subtitle">
            Review your performance and answers
          </div>
        </div>

        <div style="display:flex;gap:10px;align-items:center">
          <button id="themeToggle" class="btn btn-secondary">
            ${
              document.body.classList.contains("dark")
                ? "Light Mode ☀️"
                : "Dark Mode 🌙"
            }
          </button>

          <a href="./quizzes.html" class="btn btn-primary">
            Take Another Quiz →
          </a>
        </div>
      </div>

      <div style="max-width:950px;margin:0 auto">

        <div class="card"
          style="text-align:center;padding:40px;margin-bottom:24px">

          <div style="
            width:140px;
            height:140px;
            margin:0 auto 20px;
            border-radius:50%;
            border:8px solid ${col};
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:42px;
            font-weight:800;
            color:${col};
            background:rgba(255,255,255,0.03)">
            ${pct}%
          </div>

          <div style="font-size:28px;font-weight:800;margin-bottom:8px">
            ${passed ? "🎉 Passed!" : "📚 Keep Practicing"}
          </div>

          <div style="color:var(--muted);font-size:15px;margin-bottom:24px">
            ${attempt.score} correct out of ${attempt.total_questions} questions
          </div>

          <div class="grid-4" style="gap:16px">

            <div class="stat-card">
              <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                SCORE
              </div>
              <div style="font-size:28px;font-weight:800;color:${col}">
                ${pct}%
              </div>
            </div>

            <div class="stat-card">
              <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                CORRECT
              </div>
              <div style="font-size:28px;font-weight:800;color:var(--success)">
                ${attempt.score}
              </div>
            </div>

            <div class="stat-card">
              <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                WRONG
              </div>
              <div style="font-size:28px;font-weight:800;color:var(--danger)">
                ${attempt.total_questions - attempt.score}
              </div>
            </div>

            <div class="stat-card">
              <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
                TIME
              </div>
              <div style="font-size:28px;font-weight:800;color:var(--accent)">
                ${dur}m
              </div>
            </div>

          </div>

          <div style="
            display:flex;
            justify-content:center;
            gap:12px;
            flex-wrap:wrap;
            margin-top:28px">

            <a href="./quizzes.html" class="btn btn-secondary">
              Browse Quizzes
            </a>

            <a href="./leaderboard.html" class="btn btn-primary">
              View Leaderboard
            </a>

          </div>
        </div>

        <div class="card">

          <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-bottom:24px;
            flex-wrap:wrap">

            <div>
              <div style="font-size:20px;font-weight:700">
                ${attempt.quiz_title}
              </div>

              <div style="font-size:13px;color:var(--muted)">
                ${attempt.subject_name || "General Quiz"}
              </div>
            </div>

            <span class="badge ${passed ? "badge-green" : "badge-red"}">
              ${passed ? "PASSED" : "FAILED"}
            </span>

          </div>

          <div style="font-size:18px;font-weight:700;margin-bottom:20px">
            Answer Review
          </div>

          ${(attempt.answers || [])
            .map(
              (a, i) => `

              <div style="
                padding:20px 0;
                border-bottom:1px solid rgba(42,42,106,0.35)">

                <div style="
                  display:flex;
                  gap:12px;
                  align-items:flex-start;
                  margin-bottom:16px">

                  <div style="
                    width:28px;
                    height:28px;
                    border-radius:50%;
                    background:${
                      a.is_correct
                        ? "rgba(34,197,94,0.15)"
                        : "rgba(239,68,68,0.15)"
                    };
                    color:${a.is_correct ? "var(--success)" : "var(--danger)"};
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    font-size:14px;
                    font-weight:700;
                    flex-shrink:0">

                    ${a.is_correct ? "✓" : "✕"}

                  </div>

                  <div style="
                    font-size:15px;
                    font-weight:600;
                    line-height:1.6">

                    Q${i + 1}. ${a.text}

                  </div>

                </div>

                <div style="
                  display:grid;
                  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
                  gap:10px;
                  margin-left:40px">

                  ${["a", "b", "c", "d"]
                    .map((o, oi) => {
                      const isCorrect = a.correct_option === o;
                      const isSelected = a.selected_option === o;

                      let styles = `
                      background:rgba(255,255,255,0.03);
                      border:1px solid var(--border);
                    `;

                      if (isCorrect) {
                        styles = `
                        background:rgba(34,197,94,0.12);
                        border:1px solid var(--success);
                      `;
                      } else if (isSelected) {
                        styles = `
                        background:rgba(239,68,68,0.12);
                        border:1px solid var(--danger);
                      `;
                      }

                      return `
                      <div style="
                        ${styles}
                        border-radius:10px;
                        padding:12px 14px;
                        font-size:13px;
                        line-height:1.5">

                        <b>${["A", "B", "C", "D"][oi]}.</b>
                        ${a["option_" + o]}

                        ${
                          isCorrect
                            ? `<span style="color:var(--success)"> ✓</span>`
                            : ""
                        }

                        ${
                          isSelected && !isCorrect
                            ? `<span style="color:var(--danger)"> ✕</span>`
                            : ""
                        }

                      </div>
                    `;
                    })
                    .join("")}

                </div>

                ${
                  a.explanation
                    ? `
                    <div style="
                      margin:14px 0 0 40px;
                      background:rgba(56,189,248,0.08);
                      border:1px solid rgba(56,189,248,0.2);
                      border-radius:10px;
                      padding:14px;
                      font-size:13px;
                      line-height:1.7;
                      color:var(--accent)">

                      💡 ${a.explanation}

                    </div>
                  `
                    : ""
                }

              </div>

            `,
            )
            .join("")}

        </div>

      </div>
    `;

          const btn = document.getElementById("themeToggle");

          btn.addEventListener("click", () => {
            document.body.classList.toggle("dark");

            const isDark = document.body.classList.contains("dark");

            localStorage.setItem("theme", isDark ? "dark" : "light");

            btn.textContent = isDark ? "Light Mode ☀️" : "Dark Mode 🌙";
          });
        } catch (e) {
          document.getElementById("content").innerHTML = `
      <div class="card" style="text-align:center;padding:60px">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:10px">
          Failed to load results
        </div>

        <p style="color:var(--danger)">
          ${e.message}
        </p>

        <a href="./quizzes.html"
          class="btn btn-primary"
          style="margin-top:20px">

          Back to Quizzes

        </a>
      </div>
    `;
        }
      })();

      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });
    </script>
  </body>
</html>
