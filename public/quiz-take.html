<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz — Examify</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="icon" type="image/png" href="./favicon.png" />
  </head>
  <body>
    <div style="max-width: 1100px; margin: 0 auto; padding: 32px 20px">
      <div id="content">
        <div class="loading-center">
          <div class="spinner"></div>
          <p>Loading quiz...</p>
        </div>
      </div>
    </div>

    <script src="./js/app.js"></script>

    <script>
      const params = new URLSearchParams(location.search);
      const quizId = params.get("quiz");

      let quiz = null;
      let questions = [];
      let answers = {};
      let current = 0;
      let attemptId = null;
      let timeLeft = 0;
      let timer = null;

      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;

        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      function startTimer() {
        timer = setInterval(() => {
          timeLeft--;

          const timerEl = document.getElementById("timer");

          if (timerEl) {
            timerEl.innerHTML = `⏱ ${formatTime(timeLeft)}`;

            timerEl.className =
              "timer " +
              (timeLeft <= 60 ? "danger" : timeLeft <= 300 ? "warning" : "");
          }

          if (timeLeft <= 0) {
            clearInterval(timer);
            submitQuiz();
          }
        }, 1000);
      }

      function pickAnswer(option) {
        const q = questions[current];

        answers[q.id] = option;

        renderQuestion();
      }

      function go(dir) {
        current = Math.max(0, Math.min(questions.length - 1, current + dir));

        renderQuestion();
      }

      function jump(index) {
        current = index;
        renderQuestion();
      }

      function renderQuestion() {
        const q = questions[current];
        const selected = answers[q.id];

        document.getElementById("quiz-body").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap">
      <div style="font-size:13px;color:var(--muted)">
        Question ${current + 1} of ${questions.length}
      </div>

      <div style="font-size:13px;color:var(--muted)">
        ${Object.keys(answers).length} Answered
      </div>
    </div>

    <div class="progress-bar" style="margin-bottom:24px">
      <div class="progress-fill"
        style="width:${((current + 1) / questions.length) * 100}%">
      </div>
    </div>

    <div style="font-size:20px;font-weight:700;line-height:1.6;margin-bottom:24px">
      ${q.text}
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      ${["a", "b", "c", "d"]
        .map(
          (opt, i) => `
        <button
          class="option-btn ${selected === opt ? "selected" : ""}"
          onclick="pickAnswer('${opt}')">

          <span class="option-letter">
            ${["A", "B", "C", "D"][i]}
          </span>

          <span>
            ${q["option_" + opt]}
          </span>
        </button>
      `,
        )
        .join("")}
    </div>

    <div style="display:flex;justify-content:space-between;margin-top:28px;gap:10px;flex-wrap:wrap">
      <button
        class="btn btn-secondary"
        onclick="go(-1)"
        ${current === 0 ? "disabled" : ""}>
        ← Previous
      </button>

      ${
        current < questions.length - 1
          ? `
            <button class="btn btn-primary" onclick="go(1)">
              Next →
            </button>
          `
          : `
            <button class="btn btn-success" onclick="confirmSubmit()">
              ✓ Submit Quiz
            </button>
          `
      }
    </div>
  `;

        document.getElementById("question-nav").innerHTML = questions
          .map((q, i) => {
            const answered = answers[q.id];

            return `
        <button
          onclick="jump(${i})"
          style="
            width:36px;
            height:36px;
            border-radius:50%;
            border:none;
            cursor:pointer;
            font-size:12px;
            font-weight:700;
            transition:0.2s;
            background:
              ${
                i === current
                  ? "var(--primary)"
                  : answered
                    ? "rgba(91,61,232,0.35)"
                    : "var(--card2)"
              };
            color:var(--text);
          ">
          ${i + 1}
        </button>
      `;
          })
          .join("");
      }

      function confirmSubmit() {
        const unanswered = questions.length - Object.keys(answers).length;

        if (
          unanswered > 0 &&
          !confirm(
            `You still have ${unanswered} unanswered question(s). Submit anyway?`,
          )
        ) {
          return;
        }

        submitQuiz();
      }

      async function submitQuiz() {
        clearInterval(timer);

        document.getElementById("quiz-body").innerHTML = `
    <div class="loading-center">
      <div class="spinner"></div>
      <p>Submitting quiz...</p>
    </div>
  `;

        try {
          const res = await api(`/api/attempts/${attemptId}/submit`, {
            method: "POST",
            body: {
              answers,
            },
          });

          if (!res) return;

          toast("Quiz submitted successfully!", "success");

          window.location.href = `./results.html?attempt=${res.id}`;
        } catch (err) {
          toast(err.message, "error");
        }
      }

      (async () => {
        const user = await requireAuth();

        if (!user) return;

        if (!quizId) {
          location.href = "./quizzes.html";
          return;
        }

        try {
          const [quizRes, questionsRes] = await Promise.all([
            api(`/api/quizzes/${quizId}`),
            api(`/api/quizzes/${quizId}/questions`),
          ]);

          quiz = quizRes;
          questions = questionsRes || [];

          if (!quiz || !questions.length) {
            document.getElementById("content").innerHTML = `
        <div class="card" style="text-align:center;padding:50px">
          <div style="font-size:20px;font-weight:700;margin-bottom:10px">
            Quiz not available
          </div>

          <p style="color:var(--muted);margin-bottom:20px">
            This quiz currently has no questions.
          </p>

          <a href="./quizzes.html" class="btn btn-primary">
            Back to Quizzes
          </a>
        </div>
      `;
            return;
          }

          const attempt = await api("/api/attempts", {
            method: "POST",
            body: {
              quiz_id: parseInt(quizId),
            },
          });

          if (!attempt) return;

          attemptId = attempt.id;

          timeLeft = (quiz.duration_minutes || 30) * 60;

          document.getElementById("content").innerHTML = `
      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:20px;
        margin-bottom:24px;
        flex-wrap:wrap;
      ">

        <div>
          <a
            href="./quizzes.html"
            style="font-size:13px;color:var(--muted)">
            ← Back to Quizzes
          </a>

          <div style="font-size:28px;font-weight:800;margin-top:6px">
            ${quiz.title}
          </div>

          <div style="font-size:14px;color:var(--muted);margin-top:4px">
            ${quiz.subject_name || "General"} ·
            ${questions.length} Questions
          </div>
        </div>

        <div id="timer" class="timer">
          ⏱ ${formatTime(timeLeft)}
        </div>
      </div>

      <div style="
        display:grid;
        grid-template-columns:minmax(0,1fr) 220px;
        gap:20px;
        align-items:start;
      " class="quiz-layout">

        <div class="card">
          <div id="quiz-body"></div>
        </div>

        <div class="card card-sm">
          <div style="
            font-size:13px;
            font-weight:700;
            margin-bottom:14px;
            color:var(--muted);
          ">
            QUESTIONS
          </div>

          <div
            id="question-nav"
            style="
              display:flex;
              flex-wrap:wrap;
              gap:8px;
            ">
          </div>

          <div style="
            margin-top:18px;
            font-size:12px;
            line-height:1.8;
            color:var(--muted);
          ">

            <div>
              <span style="
                display:inline-block;
                width:14px;
                height:14px;
                border-radius:50%;
                background:rgba(91,61,232,0.35);
                margin-right:6px;
                vertical-align:middle;
              "></span>
              Answered
            </div>

            <div>
              <span style="
                display:inline-block;
                width:14px;
                height:14px;
                border-radius:50%;
                background:var(--card2);
                margin-right:6px;
                vertical-align:middle;
              "></span>
              Not Answered
            </div>
          </div>
        </div>

      </div>
    `;

          renderQuestion();

          startTimer();
        } catch (err) {
          document.getElementById("content").innerHTML = `
      <div class="card" style="padding:40px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--danger);margin-bottom:10px">
          Failed to load quiz
        </div>

        <p style="color:var(--muted)">
          ${err.message}
        </p>
      </div>
    `;
        }
      })();
    </script>
  </body>
</html>
