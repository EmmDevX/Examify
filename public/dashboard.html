<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Examify</title>

    <link rel="icon" type="image/png" href="./favicon.png" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/toogle.css" />
    <link rel="stylesheet" href="./css/dash.css" />
  </head>

  <body>
    <button class="mobile-menu-btn" id="menuBtn">☰</button>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div id="content">
          <div class="loading-center">
            <div class="spinner"></div>
            <p>Loading dashboard...</p>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/app.js"></script>

    <script>
      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });

      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }

      let currentUser = null;

      (async () => {
        currentUser = await requireAuth();

        if (!currentUser) return;

        document.getElementById("sidebar").innerHTML = renderSidebar(
          "/dashboard.html",
          currentUser.role === "admin"
        );

        document.getElementById("content").innerHTML = `
          <div class="page-header">
            <div>
              <div class="page-title">
                Welcome back, ${currentUser.name.split(" ")[0]} 👋
              </div>

              <div class="page-subtitle">
                Loading your progress...
              </div>
            </div>
          </div>

          <div class="grid-4" style="margin-bottom:24px">
            <div class="loading-center"><div class="spinner"></div></div>
            <div class="loading-center"><div class="spinner"></div></div>
            <div class="loading-center"><div class="spinner"></div></div>
            <div class="loading-center"><div class="spinner"></div></div>
          </div>

          <div class="grid-2">
            <div class="card"><div class="spinner"></div></div>
            <div class="card"><div class="spinner"></div></div>
          </div>
        `;

        requestAnimationFrame(loadDashboardData);
      })();

      async function loadDashboardData() {

        let stats = await api("/api/dashboard");

        if (!stats) return;

        stats.subject_scores = stats.subject_scores || [];
        stats.recent_attempts = stats.recent_attempts || [];

        setTimeout(() => {
          renderDashboard(stats);
        }, 50);
      }

      function renderDashboard(stats) {

        document.getElementById("content").innerHTML = `
          <div class="page-header">

            <div>
              <div class="page-title">
                Welcome back, ${currentUser.name.split(" ")[0]} 👋
              </div>

              <div class="page-subtitle">
                Here's your learning progress today
              </div>
            </div>

            <div style="display:flex;gap:10px;align-items:center">

              <button id="themeToggle" class="btn btn-secondary">
                ${
                  document.body.classList.contains("dark")
                    ? "Light Mode ☀️"
                    : "Dark Mode 🌙"
                }
              </button>

              <a href="./quizzes.html" class="btn btn-primary">
                Take Quiz →
              </a>

            </div>
          </div>

          <div class="grid-4" style="margin-bottom:24px">

            ${[
              {
                label: "Total Attempts",
                value: stats.total_attempts || 0,
                color: "var(--primary)"
              },
              {
                label: "Average Score",
                value: (stats.avg_score || 0) + "%",
                color: "var(--success)"
              },
              {
                label: "Best Score",
                value: (stats.best_score || 0) + "%",
                color: "var(--warning)"
              },
              {
                label: "Weekly Streak",
                value: stats.weekly_streak || 0,
                color: "var(--accent)"
              },
            ]
              .map(
                (card) => `
                  <div class="stat-card">

                    <div style="
                      font-size:12px;
                      color:var(--muted);
                      margin-bottom:10px;
                      text-transform:uppercase;
                    ">
                      ${card.label}
                    </div>

                    <div style="
                      font-size:34px;
                      font-weight:800;
                      color:${card.color};
                    ">
                      ${card.value}
                    </div>

                  </div>
                `
              )
              .join("")}

          </div>

          <div class="grid-2">

            <div class="card">

              <div style="
                font-size:17px;
                font-weight:700;
                margin-bottom:18px;
              ">
                Score by Subject
              </div>

              ${
                stats.subject_scores.length
                  ? stats.subject_scores.map(subject => `
                      <div style="margin-bottom:18px">

                        <div style="
                          display:flex;
                          justify-content:space-between;
                          font-size:13px;
                          margin-bottom:7px;
                        ">

                          <span>
                            ${subject.subject}
                          </span>

                          <span style="
                            font-weight:700;
                            color:var(--primary);
                          ">
                            ${subject.score || 0}%
                          </span>

                        </div>

                        <div class="progress-bar">

                          <div
                            class="progress-fill"
                            style="width:${subject.score || 0}%;">
                          </div>

                        </div>

                      </div>
                    `).join("")
                  : `
                    <div style="
                      text-align:center;
                      padding:40px;
                      color:var(--muted);
                    ">
                      No subject performance yet
                    </div>
                  `
              }

            </div>

            <div class="card">

              <div style="
                font-size:17px;
                font-weight:700;
                margin-bottom:18px;
              ">
                Recent Attempts
              </div>

              ${
                stats.recent_attempts.length
                  ? stats.recent_attempts.map(a => {

                      const percent = Math.round(a.score || 0);

                      return `
                        <div style="
                          display:flex;
                          justify-content:space-between;
                          align-items:center;
                          padding:12px 0;
                        ">

                          <div>

                            <div style="
                              font-size:14px;
                              font-weight:600;
                            ">
                              ${a.title}
                            </div>

                            <div style="
                              font-size:12px;
                              color:var(--muted);
                            ">
                              ${a.subject || "General"} •
                              ${new Date(a.completed_at).toLocaleDateString()}
                            </div>

                          </div>

                          <a
                            href="./results.html?attempt=${a.id}"
                            class="badge ${
                              percent >= 70
                                ? "badge-green"
                                : percent >= 40
                                  ? "badge-yellow"
                                  : "badge-red"
                            }"
                          >
                            ${percent}%
                          </a>

                        </div>
                      `;
                    }).join("")
                  : `
                    <div style="
                      text-align:center;
                      padding:40px;
                      color:var(--muted);
                    ">
                      No quiz attempts yet
                    </div>
                  `
              }

            </div>

          </div>
        `;

        document
          .getElementById("themeToggle")
          .addEventListener("click", () => {

            document.body.classList.toggle("dark");

            const dark =
              document.body.classList.contains("dark");

            localStorage.setItem(
              "theme",
              dark ? "dark" : "light"
            );

            document.getElementById(
              "themeToggle"
            ).textContent =
              dark
                ? "Light Mode ☀️"
                : "Dark Mode 🌙";
          });
      }
    </script>
  </body>
</html>
