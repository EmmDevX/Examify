<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Examify</title>

    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/toogle.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />

  </head>

  <body>
    <button class="mobile-menu-btn" id="menuBtn">☰</button>
    <div class="sidebar-overlay" id="overlay"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div id="content">
          <div class="loading-center">
            <div class="spinner"></div>
            <p>Loading dashboard...</p>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/app.js"></script>

    <script>
      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });

      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }

      let currentUser = null;

      (async () => {
        currentUser = await requireAuth();

        if (!currentUser) return;

        document.getElementById("sidebar").innerHTML = renderSidebar(
          "/dashboard.html",
          currentUser.role === "admin"
        );

        document.getElementById("content").innerHTML = `
          <div class="page-header">
            <div>
              <div class="page-title">
                Welcome back, ${currentUser.name.split(" ")[0]} 👋
              </div>

              <div class="page-subtitle">
                Loading your progress...
              </div>
            </div>
          </div>

          <div class="grid-4" style="margin-bottom:24px">
            <div class="loading-center"><div class="spinner"></div></div>
            <div class="loading-center"><div class="spinner"></div></div>
            <div class="loading-center"><div class="spinner"></div></div>
            <div class="loading-center"><div class="spinner"></div></div>
          </div>

          <div class="grid-2">
            <div class="card"><div class="spinner"></div></div>
            <div class="card"><div class="spinner"></div></div>
          </div>
        `;

        requestAnimationFrame(loadDashboardData);
      })();

      async function loadDashboardData() {
        try {
          let stats = await api("/api/dashboard");

          if (!stats) return;

          stats.subject_scores = stats.subject_scores || [];
          stats.recent_attempts = stats.recent_attempts || [];

          renderDashboard(stats);
        } catch (err) {
          console.error(err);

          document.getElementById("content").innerHTML = `
            <div class="card" style="padding:40px;text-align:center">
              <div style="font-size:22px;font-weight:700;margin-bottom:10px;color:var(--danger);">
                Failed to load dashboard
              </div>
              <p style="color:var(--muted)">
                ${err.message || "Something went wrong"}
              </p>
            </div>
          `;
        }
      }

      function renderDashboard(stats) {
        document.getElementById("content").innerHTML = `
          <div class="page-header">
            <div>
              <div class="page-title">
                Welcome back, ${currentUser.name.split(" ")[0]} 👋
              </div>

              <div class="page-subtitle">
                Here's your learning progress today
              </div>
            </div>

            <div style="display:flex;gap:10px;align-items:center">
              <button id="themeToggle" class="btn btn-secondary">
                ${
                  document.body.classList.contains("dark")
                    ? "Light Mode ☀️"
                    : "Dark Mode 🌙"
                }
              </button>

              <a href="./quizzes.html" class="btn btn-primary">
                Take Quiz →
              </a>
            </div>
          </div>

          <div class="grid-4" style="margin-bottom:24px">
            <div class="stat-card">
              Total Attempts<br/>
              <b>${stats.total_attempts}</b>
            </div>

            <div class="stat-card">
              Average Score<br/>
              <b>${Number(stats.avg_score || 0).toFixed(1)}%</b>
            </div>

            <div class="stat-card">
              Best Score<br/>
              <b>${Number(stats.best_score || 0).toFixed(1)}%</b>
            </div>

            <div class="stat-card">
              Weekly Streak<br/>
              <b>${stats.weekly_streak}</b>
            </div>
          </div>

          <div class="grid-2">
            <div class="card">
              <div style="font-size:17px;font-weight:700;margin-bottom:18px;">
                Score by Subject
              </div>

              ${
                stats.subject_scores.length
                  ? stats.subject_scores.map(subject => `
                    <div style="margin-bottom:18px">
                      <div style="display:flex;justify-content:space-between">
                        <span>${subject.subject || "General"}</span>
                        <span>${Number(subject.score || 0)}%</span>
                      </div>

                      <div class="progress-bar">
                        <div class="progress-fill" style="width:${Number(subject.score || 0)}%"></div>
                      </div>
                    </div>
                  `).join("")
                  : `<p>No subject performance yet</p>`
              }
            </div>

            <div class="card">
              <div style="font-size:17px;font-weight:700;margin-bottom:18px;">
                Recent Attempts
              </div>

              ${
                stats.recent_attempts.length
                  ? stats.recent_attempts.map(a => `
                    <div style="display:flex;justify-content:space-between;padding:10px 0">
                      <div>
                        <div>${a.title}</div>
                        <div style="font-size:12px;color:gray">
                          ${a.subject} • ${
                            a.completed_at
                              ? new Date(a.completed_at).toLocaleDateString()
                              : "Recently"
                          }
                        </div>
                      </div>

                      <div><b>${Number(a.score || 0)}%</b></div>
                    </div>
                  `).join("")
                  : `<p>No quiz attempts yet</p>`
              }
            </div>
          </div>
        `;

        document.getElementById("themeToggle").addEventListener("click", () => {
          document.body.classList.toggle("dark");

          localStorage.setItem(
            "theme",
            document.body.classList.contains("dark") ? "dark" : "light"
          );

          document.getElementById("themeToggle").textContent =
            document.body.classList.contains("dark")
              ? "Light Mode ☀️"
              : "Dark Mode 🌙";
        });
      }
    </script>
  </body>
</html>
