<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign Up — Examify</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" type="image/png" href="./favicon.png" />

    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
      }

      .auth-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(
            circle at top left,
            rgba(91, 61, 232, 0.25),
            transparent 35%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(56, 189, 248, 0.16),
            transparent 35%
          ),
          linear-gradient(135deg, var(--bg), var(--bg2));
      }

      .auth-grid {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 100%
        );
      }

      .auth-wrapper {
        width: 100%;
        max-width: 480px;
      }

      .auth-card {
        background: rgba(16, 16, 58, 0.88);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 42px;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        animation: fadeUp 0.5s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .auth-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 30px;
      }

      .logo-icon {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 800;
        color: white;
        box-shadow: 0 10px 25px rgba(91, 61, 232, 0.45);
      }

      .brand-name {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .auth-title {
        font-size: 30px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 10px;
        line-height: 1.2;
      }

      .auth-subtitle {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 32px;
      }

      .error-box {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        padding: 14px 16px;
        border-radius: 12px;
        font-size: 13px;
        margin-bottom: 18px;
        display: none;
      }

      .success-box {
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #4ade80;
        padding: 14px 16px;
        border-radius: 12px;
        font-size: 13px;
        margin-bottom: 18px;
        display: none;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .input-wrap {
        position: relative;
      }

      .form-group input {
        width: 100%;
        height: 54px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        padding: 0 16px;
        color: var(--text);
        font-size: 14px;
        transition: 0.2s ease;
      }

      .form-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(91, 61, 232, 0.15);
        background: rgba(255, 255, 255, 0.06);
      }

      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 18px;
      }

      .password-strength {
        margin-top: 8px;
      }

      .strength-bar {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
        margin-bottom: 6px;
      }

      .strength-fill {
        height: 100%;
        width: 0%;
        transition: 0.3s ease;
        border-radius: inherit;
      }

      .strength-text {
        font-size: 12px;
        color: var(--muted);
      }

      .terms {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 10px;
        margin-bottom: 22px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }

      .terms input {
        margin-top: 3px;
        accent-color: var(--primary);
      }

      .terms a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      .auth-btn {
        width: 100%;
        height: 54px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-hover)
        );
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.25s ease;
        box-shadow: 0 12px 24px rgba(91, 61, 232, 0.28);
      }

      .auth-btn:hover {
        transform: translateY(-2px);
      }

      .auth-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .divider {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        margin: 26px 0;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      .google-btn {
        width: 100%;
        height: 52px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .google-btn:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: var(--primary);
      }

      .auth-footer {
        text-align: center;
        margin-top: 24px;
        color: var(--muted);
        font-size: 14px;
      }

      .auth-footer a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
      }

      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: rgba(16, 16, 58, 0.75);
        backdrop-filter: blur(14px);
        color: white;
        cursor: pointer;
        z-index: 20;
        font-size: 18px;
      }

      @media (max-width: 520px) {
        .auth-card {
          padding: 30px 22px;
          border-radius: 22px;
        }

        .auth-title {
          font-size: 26px;
        }

        .brand-name {
          font-size: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="auth-bg"></div>
    <div class="auth-grid"></div>

    <button class="theme-toggle" id="themeToggle">🌙</button>

    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon">E</div>
          <div class="brand-name">Examify</div>
        </div>

        <div class="auth-title">Create Account 🚀</div>

        <div class="auth-subtitle">
          Join thousands of students preparing smarter with Examify.
        </div>

        <div class="error-box" id="error-msg"></div>
        <div class="success-box" id="success-msg"></div>

        <form id="register-form">
          <div class="form-group">
            <label>Full Name</label>

            <div class="input-wrap">
              <input
                type="text"
                id="name"
                placeholder="e.g. Chidi Okonkwo"
                required
                autocomplete="name"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Email Address</label>

            <div class="input-wrap">
              <input
                type="email"
                id="email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>

            <div class="input-wrap">
              <input
                type="password"
                id="password"
                placeholder="At least 6 characters"
                required
                autocomplete="new-password"
                minlength="6"
              />

              <button type="button" class="password-toggle" id="togglePassword">
                👁
              </button>
            </div>

            <div class="password-strength">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>

              <div class="strength-text" id="strengthText">
                Password strength
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>

            <div class="input-wrap">
              <input
                type="password"
                id="confirm"
                placeholder="Repeat your password"
                required
                autocomplete="new-password"
              />
            </div>
          </div>

          <label class="terms">
            <input type="checkbox" id="terms" required />

            <span>
              I agree to the
              <a href="#">Terms</a>
              and
              <a href="#">Privacy Policy</a>
            </span>
          </label>

          <button type="submit" class="auth-btn" id="submit-btn">
            Create Account
          </button>
        </form>

        <div class="divider">OR</div>

        <button class="google-btn">Continue with Google</button>

        <div class="auth-footer">
          Already have an account?
          <a href="./sign-in.html"> Log In </a>
        </div>
      </div>
    </div>

    <script src="./js/app.js"></script>

    <script>
      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeToggle").textContent = "☀️";
      }

      document.getElementById("themeToggle").addEventListener("click", () => {
        document.body.classList.toggle("dark");

        const isDark = document.body.classList.contains("dark");

        localStorage.setItem("theme", isDark ? "dark" : "light");

        document.getElementById("themeToggle").textContent = isDark
          ? "☀️"
          : "🌙";
      });

      fetch("/api/auth/me", {
        credentials: "include",
      }).then((r) => {
        if (r.ok) {
          window.location.href = "./dashboard.html";
        }
      });

      const passwordInput = document.getElementById("password");
      const togglePassword = document.getElementById("togglePassword");

      togglePassword.addEventListener("click", () => {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";

        passwordInput.setAttribute("type", type);

        togglePassword.textContent = type === "password" ? "👁" : "🙈";
      });

      passwordInput.addEventListener("input", () => {
        const value = passwordInput.value;

        const fill = document.getElementById("strengthFill");
        const text = document.getElementById("strengthText");

        let strength = 0;

        if (value.length >= 6) strength++;
        if (/[A-Z]/.test(value)) strength++;
        if (/[0-9]/.test(value)) strength++;
        if (/[^A-Za-z0-9]/.test(value)) strength++;

        const levels = [
          { width: "20%", text: "Weak", color: "#ef4444" },
          { width: "45%", text: "Fair", color: "#f59e0b" },
          { width: "70%", text: "Good", color: "#3b82f6" },
          { width: "100%", text: "Strong", color: "#22c55e" },
        ];

        if (value.length === 0) {
          fill.style.width = "0%";
          text.textContent = "Password strength";
          return;
        }

        const level = levels[Math.max(0, strength - 1)];

        fill.style.width = level.width;
        fill.style.background = level.color;

        text.textContent = level.text;
        text.style.color = level.color;
      });

      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("submit-btn");
          const errBox = document.getElementById("error-msg");
          const successBox = document.getElementById("success-msg");

          errBox.style.display = "none";
          successBox.style.display = "none";

          const name = document.getElementById("name").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const confirm = document.getElementById("confirm").value;

          if (password !== confirm) {
            errBox.textContent = "Passwords do not match.";
            errBox.style.display = "block";

            return;
          }

          btn.disabled = true;

          btn.innerHTML = `
        <span style="display:flex;align-items:center;justify-content:center;gap:10px">
          <span class="spinner" style="width:18px;height:18px"></span>
          Creating account...
        </span>
      `;

          try {
            const res = await fetch("/api/auth/register", {
              method: "POST",
              credentials: "include",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                name,
                email,
                password,
              }),
            });

            const data = await res.json();

            if (!res.ok) {
              errBox.textContent = data.error || "Registration failed.";

              errBox.style.display = "block";

              btn.disabled = false;
              btn.textContent = "Create Account";

              return;
            }

            successBox.textContent =
              "Account created successfully! Redirecting...";

            successBox.style.display = "block";

            toast("Welcome to Examify!", "success");

            setTimeout(() => {
              window.location.href = "./dashboard.html";
            }, 1200);
          } catch (err) {
            errBox.textContent = "Could not connect to server.";

            errBox.style.display = "block";

            btn.disabled = false;
            btn.textContent = "Create Account";
          }
        });
    </script>
  </body>
</html>
