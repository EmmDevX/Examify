<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Examify</title>
  <link rel="stylesheet" href="./css/style.css" />
   <link rel="icon" type="image/png" href="./favicon.png">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .auth-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; }
    .auth-logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:28px; }
    .auth-title { font-size:22px; font-weight:800; text-align:center; margin-bottom:6px; }
    .auth-subtitle { font-size:14px; color:var(--muted); text-align:center; margin-bottom:28px; }
    .error-box { background:rgba(239,68,68,0.1); border:1px solid var(--danger); border-radius:8px; padding:12px 16px; font-size:13px; color:#f87171; margin-bottom:16px; display:none; }
    .password-hint { font-size:12px; color:var(--muted); margin-top:5px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="width:42px;height:42px;font-size:18px">E</div>
      <span style="font-size:20px;font-weight:700">Examify</span>
    </div>
    <div class="auth-title">Create your account</div>
    <div class="auth-subtitle">Start Examify now to ace all your Exams</div>

    <div class="error-box" id="error-msg"></div>

    <form id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Chidi Okonkwo" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6" />
        <div class="password-hint">Must be at least 6 characters long</div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;padding:13px" id="submit-btn">
        Create Account
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
      Already have an account? <a href="sign-in.html" style="color:var(--primary);font-weight:600">Log in</a>
    </div>
  </div>

  <script src="./js/app.js"></script>
  <script>
  

  fetch("/api/auth/me", {
  credentials: "include"
})
  .then(r => {
    if (!r.ok) return;
    window.location.href = "./dashboard.html";
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submit-btn');
    const errBox = document.getElementById('error-msg');

    errBox.style.display = 'none';

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    if (password !== confirm) {
      errBox.textContent = 'Passwords do not match.';
      errBox.style.display = 'block';
      return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch("/api/auth/register", {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        errBox.textContent = data.error || 'Registration failed. Please try again.';
        errBox.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
        return;
      }

      window.location.href = './dashboard.html';
    } catch (err) {
      errBox.textContent = 'Could not connect to server. Make sure backend is running on port 3000.';
      errBox.style.display = 'block';
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
