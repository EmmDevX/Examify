<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — Examify</title>
    <link rel="stylesheet" href="./css/style.css" />
     <link rel="icon" type="image/png" href="./favicon.png">
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .auth-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }
      .auth-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 28px;
      }
      .auth-title {
        font-size: 22px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 6px;
      }
      .auth-subtitle {
        font-size: 14px;
        color: var(--muted);
        text-align: center;
        margin-bottom: 28px;
      }
      .error-box {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--danger);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        color: #f87171;
        margin-bottom: 16px;
        display: none;
      }
      .divider {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        margin: 20px 0;
        position: relative;
      }
      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 42%;
        height: 1px;
        background: var(--border);
      }
      .divider::before {
        left: 0;
      }
      .divider::after {
        right: 0;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="auth-logo">
        <div
          class="logo-icon"
          style="width: 42px; height: 42px; font-size: 18px"
        >
          E
        </div>
        <span style="font-size: 20px; font-weight: 700">Examify</span>
      </div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Sign in to access examify</div>

      <div class="error-box" id="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
        <button
          type="submit"
          class="btn btn-primary"
          style="width: 100%; margin-top: 8px; padding: 13px"
          id="submit-btn"
        >
          Log In
        </button>
      </form>

      <div
        style="
          text-align: center;
          margin-top: 20px;
          font-size: 14px;
          color: var(--muted);
        "
      >
        Don't have an account?
        <a href="./sign-up.html" style="color: var(--primary); font-weight: 600"
          >Sign up free</a
        >
      </div>
    </div>

    <script src="./js/app.js"></script>
    <script>


fetch("/api/auth/me", {
  credentials: "include"
})
.then(async (r) => {
  if (r.ok) {
    window.location.href = "./dashboard.html";
  }
})
.catch(() => {});

document
  .getElementById("login-form")
  .addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = document.getElementById("submit-btn");
    const errBox = document.getElementById("error-msg");

    errBox.style.display = "none";
    btn.textContent = "Logging in...";
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        errBox.textContent = data.error || "Login failed. Please try again.";
        errBox.style.display = "block";
        btn.textContent = "Log In";
        btn.disabled = false;
        return;
      }

      window.location.href = "./dashboard.html";
    } catch (err) {
      errBox.textContent =
        "Could not connect to server. Make sure backend is running on port 3000.";
      errBox.style.display = "block";
      btn.textContent = "Log In";
      btn.disabled = false;
    }
  });
</script>
  </body>
</html>
