<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Examify</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
   <link rel="icon" type="image/png" href="./favicon.png">
</head>
<body>
     <!-- MOBILE MENU BUTTON -->
  <button class="mobile-menu-btn" id="menuBtn">
    ☰
  </button>

  <!-- OVERLAY -->
  <div class="sidebar-overlay" id="overlay"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header"><div class="page-title">My Profile</div></div>
    <div id="content"><div class="loading-center"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="./js/app.js"></script>
<script>
const STATES = ['Abia','Adamawa','Akwa Ibom','Anambra','Bauchi','Bayelsa','Benue','Borno','Cross River','Delta','Ebonyi','Edo','Ekiti','Enugu','FCT','Gombe','Imo','Jigawa','Kaduna','Kano','Katsina','Kebbi','Kogi','Kwara','Lagos','Nasarawa','Niger','Ogun','Ondo','Osun','Oyo','Plateau','Rivers','Sokoto','Taraba','Yobe','Zamfara'];

let currentUser;

async function saveProfile(e) {
  e.preventDefault();

  const courses = [...document.querySelectorAll('input[name="course"]:checked')]
    .map(c => c.value);

  try {
   
    await api('/api/profile', {
      method: 'PUT',
      body: {
        name: document.getElementById('name').value,
        school: document.getElementById('school').value,
        state: document.getElementById('state').value,
        target_cgpa: parseInt(document.getElementById('target').value) || null,
        courses,
      }
    });

    toast('Profile saved!', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;

  document.getElementById('sidebar').innerHTML =
    renderSidebar('/profile.html', currentUser.role === 'admin');

  try {
   
    const subjects = await api('/api/subjects');

    document.getElementById('content').innerHTML = `
      <div class="grid-2" style="gap:24px">

        <div>
          <div class="card" style="margin-bottom:20px">
            <div style="display:flex;align-items:center;gap:16px">
              <div style="width:64px;height:64px;border-radius:50%;background:var(--primary);
                display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800">
                ${currentUser.name?.[0]?.toUpperCase() || '?'}
              </div>

              <div>
                <div style="font-size:20px;font-weight:700">${currentUser.name}</div>
                <div style="color:var(--muted);font-size:14px">${currentUser.email}</div>
                <span class="badge ${currentUser.role === 'admin' ? 'badge-purple' : 'badge-blue'}"
                  style="margin-top:6px">${currentUser.role}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div style="font-weight:700;font-size:16px;margin-bottom:20px">Edit Profile</div>

            <form onsubmit="saveProfile(event)">
              <div class="form-group">
                <label>Full Name</label>
                <input id="name" value="${currentUser.name || ''}" required />
              </div>

              <div class="form-group">
                <label>School</label>
                <input id="school" value="${currentUser.school || ''}" />
              </div>

              <div class="form-group">
                <label>State</label>
                <select id="state">
                  <option value="">Select state</option>
                  ${STATES.map(s => `
                    <option value="${s}" ${currentUser.state === s ? 'selected' : ''}>${s}</option>
                  `).join('')}
                </select>
              </div>

              <div class="form-group">
                <label>Target CGPA</label>
                <input id="target" type="number" min="0" max="5" step="0.01"
                  value="${currentUser.target_cgpa || ''}" />
              </div>

              <button type="submit" class="btn btn-primary" style="width:100%">
                Save Changes
              </button>
            </form>
          </div>
        </div>

        <div class="card">
          <div style="font-weight:700;font-size:16px;margin-bottom:4px">My Courses</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:20px">
            Select courses you're preparing for
          </div>

          <div style="display:flex;flex-direction:column;gap:8px">
            ${subjects.map(s => `
              <label style="display:flex;align-items:center;gap:10px;
                background:var(--bg2);border:1px solid var(--border);
                border-radius:8px;padding:10px 14px;cursor:pointer">

                <input type="checkbox" name="course" value="${s.code}"
                  ${(currentUser.courses || []).includes(s.code) ? 'checked' : ''}
                  style="width:16px;height:16px;accent-color:var(--primary)" />

                <span style="font-size:13px;font-weight:500">${s.name}</span>
              </label>
            `).join('')}
          </div>

          <button class="btn btn-primary" style="width:100%;margin-top:20px"
            onclick="document.querySelector('form').dispatchEvent(new Event('submit',{bubbles:true}))">
            Save Courses
          </button>
        </div>

      </div>
    `;
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<p style="color:var(--danger)">Failed to load profile: ${e.message}</p>`;
  }
})();
      /* =========================
       MOBILE SIDEBAR
    ========================= */

    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
</script>
</body>
</html>
