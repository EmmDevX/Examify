<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzes — Examify</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
   <link rel="icon" type="image/png" href="./favicon.png">
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
     <!-- MOBILE MENU BUTTON -->
  <button class="mobile-menu-btn" id="menuBtn">
    ☰
  </button>

  <!-- OVERLAY -->
  <div class="sidebar-overlay" id="overlay"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Available Quizzes</div>
        <div class="page-subtitle">Select a quiz to begin your training</div>
      </div>
      <select id="filter-subject" style="width:200px" onchange="loadQuizzes()">
        <option value="">All Subjects</option>
      </select>
    </div>
    <div id="quiz-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px">
      <div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
  </main>
</div>
<script src="./js/app.js"></script>
<script>
let currentUser;
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') {
  document.body.classList.add('dark');
}



async function loadQuizzes() {
  const subjectId = document.getElementById('filter-subject').value;
  const grid = document.getElementById('quiz-grid');

  grid.innerHTML = '<div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>';

  try {
   
    const quizzes = await api('/api/quizzes' + (subjectId ? `?subject_id=${subjectId}` : ''));

    if (!quizzes || !quizzes.length) {
      grid.innerHTML = '<div class="loading-center" style="grid-column:1/-1;color:var(--muted)">No quizzes available yet. Check back soon!</div>';
      return;
    }

    grid.innerHTML = quizzes.map(q => `
      <div class="card" style="cursor:pointer;transition:border-color 0.2s"
        onmouseover="this.style.borderColor='var(--primary)'"
        onmouseout="this.style.borderColor='var(--border)'"
        onclick="location.href='./quiz-take.html?quiz=${q.id}'">

        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <span class="badge badge-purple">${q.subject_code || 'GEN'}</span>
          <span class="badge badge-green">Live</span>
        </div>

        <div style="font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.3">${q.title}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px">${q.description || 'Practice past JAMB questions'}</div>

        <div style="display:flex;gap:16px;font-size:13px;color:var(--muted);margin-bottom:16px">
          <span>⏱ ${q.duration_minutes} mins</span>
          <span>📝 ${q.total_questions} questions</span>
        </div>

        <button class="btn btn-primary" style="width:100%"
          onclick="event.stopPropagation();location.href='./quiz-take.html?quiz=${q.id}'">
          Start Quiz →
        </button>

      </div>
    `).join('');

  } catch (e) {
    grid.innerHTML = `<p style="color:var(--danger);grid-column:1/-1">${e.message}</p>`;
  }
}

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;

  document.getElementById('sidebar').innerHTML =
    renderSidebar('/quizzes.html', currentUser.role === 'admin');

  try {
    
    const subjects = await api('/api/subjects');

    if (subjects) {
      const sel = document.getElementById('filter-subject');

      subjects.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        sel.appendChild(opt);
      });
    }
  } catch (e) {
    console.error("Subjects failed:", e);
  }

  loadQuizzes();
})();
      /* =========================
       MOBILE SIDEBAR
    ========================= */

    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
</script>
</body>
</html>
