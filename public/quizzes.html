<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quizzes — Examify</title>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />

    <link rel="icon" type="image/png" href="./favicon.png" />
  </head>

  <body>
    <button class="mobile-menu-btn" id="menuBtn">☰</button>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div class="page-header">
          <div>
            <div class="page-title">Available Quizzes</div>

            <div class="page-subtitle">
              Practice and improve your performance
            </div>
          </div>

          <div style="display: flex; gap: 10px; flex-wrap: wrap">
            <input
              type="text"
              id="searchQuiz"
              placeholder="Search quizzes..."
              style="width: 220px"
              oninput="loadQuizzes()"
            />

            <select
              id="filter-subject"
              style="width: 180px"
              onchange="loadQuizzes()"
            >
              <option value="">All Subjects</option>
            </select>
          </div>
        </div>

        <div
          id="quiz-grid"
          style="
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
          "
        >
          <div class="loading-center" style="grid-column: 1/-1">
            <div class="spinner"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/app.js"></script>

    <script>
      let currentUser;
      let allQuizzes = [];

      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }

      async function loadQuizzes() {
        const grid = document.getElementById("quiz-grid");

        const subjectId = document.getElementById("filter-subject").value;

        const search = document
          .getElementById("searchQuiz")
          .value.toLowerCase();

        grid.innerHTML = `
    <div class="loading-center" style="grid-column:1/-1">
      <div class="spinner"></div>
    </div>
  `;

        try {
          const quizzes = await api(
            "/api/quizzes" + (subjectId ? `?subject_id=${subjectId}` : ""),
          );

          allQuizzes = quizzes || [];

          let filtered = allQuizzes.filter((q) => {
            const title = (q.title || "").toLowerCase();

            const desc = (q.description || "").toLowerCase();

            return title.includes(search) || desc.includes(search);
          });

          if (!filtered.length) {
            grid.innerHTML = `
        <div
          class="card"
          style="
            grid-column:1/-1;
            text-align:center;
            padding:60px 20px;
          "
        >

          <div style="font-size:50px;margin-bottom:16px">
            📚
          </div>

          <div style="font-size:20px;font-weight:700;margin-bottom:10px">
            No quizzes found
          </div>

          <p style="color:var(--muted)">
            Try another subject or search keyword
          </p>

        </div>
      `;

            return;
          }

          grid.innerHTML = filtered
            .map((q) => {
             const questions = q.question_count || 0;

              const attempts = q.attempts || 0;

              return `
        <div
          class="card quiz-card"
          style="
            cursor:pointer;
            transition:0.25s;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
          "

          onclick="location.href='./quiz-take.html?quiz=${q.id}'"

          onmouseover="
            this.style.transform='translateY(-4px)';
            this.style.borderColor='var(--primary)';
          "

          onmouseout="
            this.style.transform='translateY(0)';
            this.style.borderColor='var(--border)';
          "
        >

          <div>

            <div style="
              display:flex;
              justify-content:space-between;
              align-items:flex-start;
              margin-bottom:14px;
              gap:10px;
            ">

              <span class="badge badge-purple">
                ${q.subject_code || "GEN"}
              </span>

              <span class="badge badge-green">
                ${q.status || "Live"}
              </span>

            </div>

            <div style="
              font-size:20px;
              font-weight:800;
              margin-bottom:10px;
              line-height:1.3;
            ">
              ${q.title}
            </div>

            <div style="
              font-size:14px;
              color:var(--muted);
              margin-bottom:20px;
              line-height:1.6;
            ">
              ${q.description || "Practice and test your knowledge with this quiz."}
            </div>

            <div style="
              display:grid;
              grid-template-columns:1fr 1fr;
              gap:10px;
              margin-bottom:18px;
            ">

              <div class="card-sm" style="
                background:var(--bg2);
                padding:12px;
                border-radius:10px;
                text-align:center;
              ">

                <div style="
                  font-size:12px;
                  color:var(--muted);
                  margin-bottom:4px;
                ">
                  Duration
                </div>

                <div style="font-weight:700">
                  ⏱ ${q.duration_minutes || 30} mins
                </div>

              </div>

              <div class="card-sm" style="
                background:var(--bg2);
                padding:12px;
                border-radius:10px;
                text-align:center;
              ">

                <div style="
                  font-size:12px;
                  color:var(--muted);
                  margin-bottom:4px;
                ">
                  Questions
                </div>

                <div style="font-weight:700">
                  📝 ${questions}
                </div>

              </div>

            </div>

            <div style="
              display:flex;
              justify-content:space-between;
              align-items:center;
              margin-bottom:18px;
              font-size:13px;
              color:var(--muted);
            ">

              <span>
                👥 ${attempts} Attempts
              </span>

              <span>
                ⭐ ${q.average_score || 0}% Avg
              </span>

            </div>

          </div>

          <button
            class="btn btn-primary"
            style="width:100%"
            onclick="
              event.stopPropagation();
              location.href='./quiz-take.html?quiz=${q.id}'
            "
          >
            Start Quiz →
          </button>

        </div>
      `;
            })
            .join("");
        } catch (err) {
          grid.innerHTML = `
      <div
        class="card"
        style="
          grid-column:1/-1;
          text-align:center;
          padding:50px;
        "
      >

        <div style="
          font-size:22px;
          font-weight:700;
          color:var(--danger);
          margin-bottom:10px;
        ">
          Failed to load quizzes
        </div>

        <p style="color:var(--muted)">
          ${err.message}
        </p>

      </div>
    `;
        }
      }

      (async () => {
        currentUser = await requireAuth();

        if (!currentUser) return;

        document.getElementById("sidebar").innerHTML = renderSidebar(
          "/quizzes.html",
          currentUser.role === "admin",
        );

        try {
          const subjects = await api("/api/subjects");

          if (subjects && subjects.length) {
            const select = document.getElementById("filter-subject");

            subjects.forEach((subject) => {
              const option = document.createElement("option");

              option.value = subject.id;
              option.textContent = subject.name;

              select.appendChild(option);
            });
          }
        } catch (err) {
          console.error(err);
        }

        loadQuizzes();
      })();

      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
      });
    </script>
  </body>
</html>
